name: Build Android AAB and APK

on:
  workflow_dispatch: # Manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Decode JKS Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

    - name: Build Signed AAB (Google Play Bundle)
      uses: ArtemGovorov/buildozer-action@v1
      id: build-aab
      with:
        command: buildozer android release
        buildozer_version: master
      env:
        APP_ANDROID_ARCHS: arm64-v8a,armeabi-v7a
        P4A_RELEASE_KEYSTORE: release.keystore
        P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEYSTORE_PASSWORD }}
        P4A_RELEASE_KEYALIAS: ${{ secrets.KEY_ALIAS }}
        P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.KEY_PASSWORD }}

    - name: Build Signed APK (Phone Testing)
      uses: ArtemGovorov/buildozer-action@v1
      id: build-apk
      with:
        command: |
          sed -i 's/^android.target =.*/android.target = apk/' buildozer.spec
          buildozer android clean
          buildozer android release
        buildozer_version: master
      env:
        APP_ANDROID_ARCHS: arm64-v8a,armeabi-v7a
        P4A_RELEASE_KEYSTORE: release.keystore
        P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEYSTORE_PASSWORD }}
        P4A_RELEASE_KEYALIAS: ${{ secrets.KEY_ALIAS }}
        P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Signed Packages Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Signed-Dragon-Builds
        path: bin/
