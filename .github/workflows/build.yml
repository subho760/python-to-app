name: Build Android AAB and APK

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lld ncurses-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev wget curl make build-essential openjdk-17-jdk unzip shadow-utils autoconf libtool
        pip install --upgrade pip
        pip install buildozer cython==0.29.36 virtualenv

    - name: Decode JKS Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

    - name: Build Signed AAB (Google Play Bundle)
      env:
        APP_ANDROID_ARCHS: arm64-v8a,armeabi-v7a
        P4A_RELEASE_KEYSTORE: release.keystore
        P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEYSTORE_PASSWORD }}
        P4A_RELEASE_KEYALIAS: ${{ secrets.KEY_ALIAS }}
        P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.KEY_PASSWORD }}
      run: |
        sed -i 's/^android.target =.*/android.target = aab/' buildozer.spec
        # Use an absolute non-interactive flag to skip license prompts entirely
        buildozer --gdb android release
        
    - name: Build Signed APK (Phone Testing)
      env:
        APP_ANDROID_ARCHS: arm64-v8a,armeabi-v7a
        P4A_RELEASE_KEYSTORE: release.keystore
        P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEYSTORE_PASSWORD }}
        P4A_RELEASE_KEYALIAS: ${{ secrets.KEY_ALIAS }}
        P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.KEY_PASSWORD }}
      run: |
        sed -i 's/^android.target =.*/android.target = apk/' buildozer.spec
        buildozer android clean
        buildozer --gdb android release

    - name: Upload Signed Packages Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Signed-Dragon-Builds
        path: bin/
